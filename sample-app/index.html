<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Capgo Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #app {
      width: 100%;
      max-width: 420px;
      padding: 2rem;
    }
    .card {
      background: rgba(30, 41, 59, 0.8);
      border: 1px solid rgba(148, 163, 184, 0.15);
      border-radius: 16px;
      padding: 2rem;
      backdrop-filter: blur(10px);
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.25rem;
      color: #f8fafc;
    }
    .version {
      font-size: 0.875rem;
      color: #94a3b8;
      margin-bottom: 1.5rem;
    }
    .version span { color: #38bdf8; font-weight: 600; }
    button {
      width: 100%;
      padding: 0.75rem 1.5rem;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      color: white;
      margin-bottom: 1rem;
    }
    button:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(59,130,246,0.4); }
    button:active { transform: translateY(0); }
    button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
    .progress-bar {
      width: 100%;
      height: 6px;
      background: rgba(148, 163, 184, 0.2);
      border-radius: 3px;
      overflow: hidden;
      margin-bottom: 1rem;
      display: none;
    }
    .progress-bar .fill {
      height: 100%;
      background: linear-gradient(90deg, #3b82f6, #38bdf8);
      border-radius: 3px;
      width: 0%;
      transition: width 0.3s;
    }
    #status {
      font-size: 0.875rem;
      color: #94a3b8;
      min-height: 3rem;
      line-height: 1.5;
    }
    .status-success { color: #4ade80 !important; }
    .status-error { color: #f87171 !important; }
  </style>
</head>
<body>
  <div id="app">
    <div class="card">
      <h1>Capgo Demo</h1>
      <p class="version">Version: <span id="current-version">loading...</span></p>
      <button id="check-btn">Check for Updates</button>
      <div class="progress-bar" id="progress-bar">
        <div class="fill" id="progress-fill"></div>
      </div>
      <div id="status">Ready to check for updates.</div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
